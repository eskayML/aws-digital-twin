name: Deploy Environment

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    # Map the environment to GitHub environments for secret protection
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ secrets.DEFAULT_AWS_REGION }}

      - name: Debug AWS Identity
        run: |
          echo "Checking identity..."
          aws sts get-caller-identity
          echo "Checking S3 access..."
          aws s3 ls s3://twin-terraform-state-${{ secrets.AWS_ACCOUNT_ID }} || echo "S3 access failed"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init and Plan
        run: |
          # Use a unique key for the GitHub Actions state to avoid conflicts with local state
          STATE_BUCKET="twin-terraform-state-${{ secrets.AWS_ACCOUNT_ID }}"
          
          terraform init \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="key=github-actions.tfstate" \
            -backend-config="region=${{ secrets.DEFAULT_AWS_REGION }}" \
            -backend-config="dynamodb_table=twin-terraform-locks" \
            -backend-config="encrypt=true" \
            -input=false
            
          terraform plan -var="env=${{ github.event.inputs.environment || 'dev' }}" -var="github_repository=${{ github.repository }}" -out=tfplan
        working-directory: ./twin/terraform

      - name: Run Deploy Script
        run: |
          export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          export DEFAULT_AWS_REGION=${{ secrets.DEFAULT_AWS_REGION }}
          chmod +x twin/scripts/deploy.sh
          ./twin/scripts/deploy.sh ${{ github.event.inputs.environment || 'dev' }}
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
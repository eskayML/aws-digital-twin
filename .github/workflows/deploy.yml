name: Deploy Environment

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ secrets.DEFAULT_AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create dummy zip for Terraform Plan
        run: |
          mkdir -p twin/backend
          touch twin/backend/lambda-deployment.zip
          echo "Placeholder for plan" > twin/backend/lambda-deployment.zip

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init and Plan
        run: |
          STATE_BUCKET="twin-terraform-state-${{ secrets.AWS_ACCOUNT_ID }}"
          terraform init \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="key=github-actions.tfstate" \
            -backend-config="region=${{ secrets.DEFAULT_AWS_REGION }}" \
            -backend-config="dynamodb_table=twin-terraform-locks" \
            -backend-config="encrypt=true" \
            -reconfigure \
            -input=false
          terraform plan -var="environment=${{ github.event.inputs.environment || 'dev' }}" -var="project_name=twin" -var="github_repository=${{ github.repository }}" -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}" -out=tfplan
        working-directory: ./twin/terraform

      - name: Run Deploy Script
        run: |
          export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          export DEFAULT_AWS_REGION=${{ secrets.DEFAULT_AWS_REGION }}
          export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          chmod +x twin/scripts/deploy.sh
          ./twin/scripts/deploy.sh ${{ github.event.inputs.environment || 'dev' }}
          
          # Invalidate CloudFront cache so changes show up immediately
          echo "🧹 Invalidating CloudFront cache..."
          DISTRIBUTION_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Origins.Items[0].Id=='S3-twin-${{ github.event.inputs.environment || 'dev' }}-frontend-${{ secrets.AWS_ACCOUNT_ID }}'].Id" --output text)
          if [ "$DISTRIBUTION_ID" != "None" ] && [ -n "$DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"
          else
            echo "⚠️ Could not find Distribution ID for invalidation"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
